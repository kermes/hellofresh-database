server {
    listen 80;
    # Handles the main app, API subdomain, and portal subdomain.
    # Add entries to /etc/hosts (see docker-compose.yml comments) or use
    # server_name _ to catch all requests on port 80.
    server_name _ localhost hfresh.test api.hfresh.test console.hfresh.test;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
